<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <main>
    <div class="Content">
      <img  id="Profile_photo" src="/assets/images/avatar_Gabriel.jpg" alt="profile_photo">
      <h1>Gabriel Lopes</h1>
      <p id="Workplace" >Brazil, Pernambuco</p>
      <p>"Front-end junior developer."</p>
      
      <div class="Socials_networks">
        <div id="Github" class="Social_media"><a href="https://github.com/Gabrielchamada">Github</a></div>
        <div id="Linkdl" class="Social_media"><a href="https://www.linkedin.com/in/gabriel-lopes-10a07339a/">Linkedl</a></div>
        <div id="Frontend_mentor" class="Social_media"><a href="https://www.frontendmentor.io/profile/Gabrielchamada">Frontend Mentor</a></div>
      </div>
    </div>
  </main>
  
  <footer class="Attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Gabrielchamada">Gabriel Lopes</a>.
  </footer>
</body>
</html>
